name: Release Build

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: top_speed_net

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Read Release Info
      id: release_info
      shell: pwsh
      run: |
        $infoPath = Join-Path $env:GITHUB_WORKSPACE "info.json"
        if (-not (Test-Path $infoPath)) {
          throw "info.json was not found at repository root."
        }

        $info = Get-Content $infoPath -Raw | ConvertFrom-Json
        if ($null -eq $info.version -or [string]::IsNullOrWhiteSpace([string]$info.version)) {
          throw "info.json is missing a valid 'version' value."
        }
        if ($null -eq $info.serverVersion -or [string]::IsNullOrWhiteSpace([string]$info.serverVersion)) {
          throw "info.json is missing a valid 'serverVersion' value."
        }

        $version = ([string]$info.version).Trim()
        $serverVersion = ([string]$info.serverVersion).Trim()
        if ($version -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d{1,3}$') {
          throw "info.json version '$version' is invalid. Expected format: YYYY.M.D.R"
        }
        if ($serverVersion -notmatch '^\d{4}\.\d{1,2}\.\d{1,2}\.\d{1,3}$') {
          throw "info.json serverVersion '$serverVersion' is invalid. Expected format: YYYY.M.D.R"
        }

        $changes = @()
        if ($null -ne $info.changes) {
          foreach ($change in $info.changes) {
            $line = [string]$change
            if (-not [string]::IsNullOrWhiteSpace($line)) {
              $changes += "* $($line.Trim())"
            }
          }
        }
        if ($changes.Count -eq 0) {
          $changes += "* No listed game changes."
        }

        $serverChanges = @()
        if ($null -ne $info.serverChanges) {
          foreach ($change in $info.serverChanges) {
            $line = [string]$change
            if (-not [string]::IsNullOrWhiteSpace($line)) {
              $serverChanges += "* $($line.Trim())"
            }
          }
        }
        if ($serverChanges.Count -eq 0) {
          $serverChanges += "* No listed server changes."
        }

        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "server_version=$serverVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_win=TopSpeed-windows-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_linux=TopSpeed-linux-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_osx=TopSpeed-mac-x64-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "game_zip_glob=TopSpeed-*-Release-v-$version.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "server_zip_glob=TopSpeed.Server-*-Release-v-$serverVersion.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "changes_md<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        $changes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "server_changes_md<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        $serverChanges | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Installs .NET 8 SDK (includes msbuild capable of building net472)

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install doc render dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown

    - name: Restore dependencies
      run: dotnet restore TopSpeed.sln

    - name: Build
      run: dotnet build TopSpeed.sln --configuration Release --no-restore

    - name: Run shared tests (net10.0)
      run: dotnet test TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net10.0 --no-build --verbosity normal

    - name: Run game tests (net472)
      run: dotnet test TopSpeed.Tests/TopSpeed.Tests.csproj --configuration Release --framework net472 --no-build --verbosity normal

    - name: Publish TopSpeed.Server (all release profiles)
      shell: pwsh
      run: |
        $profiles = @(
          "ReleaseWinX64",
          "ReleaseLinuxX64",
          "ReleaseLinuxArm64",
          "ReleaseLinuxArm32",
          "ReleaseLinuxMuslX64",
          "ReleaseLinuxMuslArm64",
          "ReleaseLinuxX86FrameworkDependent"
        )

        foreach ($profile in $profiles) {
          dotnet publish TopSpeed.Server/TopSpeed.Server.csproj --configuration Release -p:ServerPublishProfile=$profile
        }

    - name: Build TopSpeed clients
      shell: pwsh
      run: |
        function Clear-ClientBuildState {
          $paths = @(
            "TopSpeed/obj",
            "TS.Audio/obj",
            "TS.Sdl/obj",
            "MiniAudioExNET/obj",
            "SteamAudio.NET/Src/obj",
            "TopSpeed.Shared/obj"
          )

          foreach ($path in $paths) {
            if (Test-Path $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }
        }

        Clear-ClientBuildState
        dotnet build TopSpeed/TopSpeed.csproj --configuration Release --framework net10.0-windows --runtime win-x64

        Clear-ClientBuildState
        dotnet build TopSpeed/TopSpeed.csproj --configuration Release -p:RuntimeIdentifier=linux-x64

        Clear-ClientBuildState
        dotnet build TopSpeed/TopSpeed.csproj --configuration Release -p:RuntimeIdentifier=osx-x64

    - name: Create Zip Archive
      shell: powershell
      run: |
        $clientTargets = @(
          @{ Source = "TopSpeed\bin\Release\net10.0\win-x64\*"; Destination = "${{ steps.release_info.outputs.game_zip_win }}" },
          @{ Source = "TopSpeed\bin\Release\net10.0\linux-x64\*"; Destination = "${{ steps.release_info.outputs.game_zip_linux }}" },
          @{ Source = "TopSpeed\bin\Release\net10.0\osx-x64\*"; Destination = "${{ steps.release_info.outputs.game_zip_osx }}" }
        )

        foreach ($target in $clientTargets) {
          if (Test-Path $target.Destination) { Remove-Item $target.Destination -Force }
          Compress-Archive -Path $target.Source -DestinationPath $target.Destination -CompressionLevel Optimal
        }

        $serverVersion = "${{ steps.release_info.outputs.server_version }}"
        $targets = @(
          "win-x64",
          "linux-x64",
          "linux-arm64",
          "linux-arm32",
          "linux-musl-x64",
          "linux-musl-arm64",
          "linux-x86-fdd"
        )

        foreach ($rid in $targets) {
          $source = "TopSpeed.Server\publish\$rid\*"
          $destination = "TopSpeed.Server-$rid-Release-v-$serverVersion.zip"
          if (Test-Path $destination) { Remove-Item $destination -Force }
          Compress-Archive -Path $source -DestinationPath $destination -CompressionLevel Optimal
        }

    - name: Generate Commit Log
      id: changelog
      shell: pwsh
      run: |
        $log = git log -n 10 --pretty=format:"* %h - %s (%an)"
        "COMMIT_LOG<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        $log | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Update Tag
      shell: bash
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git tag -fa release-build -m "Latest Release Build"
        git push -f origin release-build

    - name: Clean Existing Release Assets
      uses: actions/github-script@v7
      with:
        script: |
          const tag = "release-build";
          let release;
          try {
            const releaseResponse = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            release = releaseResponse.data;
          } catch (error) {
            if (error.status === 404) {
              core.info(`Release '${tag}' does not exist yet. Skipping asset cleanup.`);
              return;
            }
            throw error;
          }

          const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: release.id,
            per_page: 100
          });

          for (const asset of assets) {
            core.info(`Deleting old release asset: ${asset.name}`);
            await github.rest.repos.deleteReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id
            });
          }

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: release-build
        name: Release Build v${{ steps.release_info.outputs.version }}
        body: |
          Game version: ${{ steps.release_info.outputs.version }}
          Server version: ${{ steps.release_info.outputs.server_version }}

          ### Game Changes
          ${{ steps.release_info.outputs.changes_md }}

          ### Server Changes
          ${{ steps.release_info.outputs.server_changes_md }}

          ### Recent Commits
          ${{ steps.changelog.outputs.COMMIT_LOG }}
          
          ---
          *Build from commit ${{ github.sha }}*
        draft: false
        prerelease: false
        files: |
          top_speed_net/${{ steps.release_info.outputs.game_zip_glob }}
          top_speed_net/${{ steps.release_info.outputs.server_zip_glob }}
